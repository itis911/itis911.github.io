<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 &mdash; 0xYourHandle</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    /* Extra 404 glow effects */
    @keyframes flicker {
      0%,100%{opacity:1} 41%{opacity:1} 42%{opacity:0.6} 43%{opacity:1} 78%{opacity:1} 79%{opacity:0.5} 80%{opacity:1}
    }
    .nf-code { animation: flicker 4s step-end infinite; }
    @keyframes scan {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }
    .scan-line {
      position: fixed;
      left: 0; right: 0;
      height: 2px;
      background: rgba(0,255,65,0.06);
      animation: scan 5s linear infinite;
      pointer-events: none;
      z-index: 500;
    }
  </style>
</head>
<body>

  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-vignette" aria-hidden="true"></div>
  <div class="scan-line" aria-hidden="true"></div>

  <header class="site-header">
    <div class="wrap header-inner">
      <a class="site-logo" href="index.html">
        <img class="logo-img" src="assets/logo.png" alt="logo" />
        <span class="logo-text">
          <span class="prompt">~/</span>emailof911<span class="logo-cursor"></span>
        </span>
      </a>
      <nav class="site-nav" aria-label="Main">
        <a class="nav-link" href="index.html">writeups</a>
        <a class="nav-link" href="about.html">about</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="wrap">
      <div class="not-found">

        <div class="nf-code">404</div>
        <div class="nf-glitch">ACCESS DENIED &mdash; PAGE NOT FOUND</div>

        <div class="nf-terminal">
          <div class="t-line">
            <span class="t-prompt">root@blog:~$</span>
            <span class="t-cmd"> locate <span id="nf-typeout" data-text="requested_path"></span></span>
          </div>
          <div class="t-line"><span class="t-out">locate: no results for &ldquo;<span id="nf-path">this path</span>&rdquo;</span></div>
          <div class="t-line"><span class="t-out">error: 0x404 &mdash; target not found in filesystem</span></div>
          <div class="t-line" style="margin-top:8px;color:rgba(0,255,65,0.4);">
          </div>
        </div>
        <a class="nf-home" href="index.html">cd ~/index</a>

      </div>
    </div>
  </main>
  <script src="assets/js/main.js"></script>
  <script>
    // Show the actual path in the terminal output
    var path = window.location.pathname;
    var el = document.getElementById('nf-path');
    if (el) el.textContent = path;
    // Update typewriter text to the real path
    var tw = document.getElementById('nf-typeout');
    if (tw) tw.dataset.text = path.replace(/\//g, '/');
  </script>
</body>
</html>
